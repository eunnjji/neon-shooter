<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v41.0 - FINAL CORE</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; }
        .interactive { pointer-events: auto; }
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(40px); transition: 0.8s; }
        .main-btn { padding: 22px 100px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 60px; font-weight: bold; font-size: 1.7rem; cursor: pointer; box-shadow: 0 0 40px var(--mint); transition: 0.3s; letter-spacing: 5px; }
        #hud { position: absolute; top: 0; width: 100%; padding: env(safe-area-inset-top) 25px 0; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; }
        .hud-box { background: rgba(0, 0, 0, 0.7); border: 2.5px solid var(--mint); padding: 10px 25px; border-radius: 30px; box-shadow: 0 0 20px var(--mint); }
        #boss-ui { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 85%; display: none; text-align: center; }
        .hp-container { height: 14px; background: rgba(255, 0, 255, 0.1); border: 2px solid var(--pink); border-radius: 30px; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--pink), #fff); width: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <div style="color:var(--mint); font-size:3.5rem; font-style:italic; text-shadow:0 0 40px var(--mint); margin-bottom:40px;">NEON SHOOTER</div>
        <button class="main-btn" onclick="startGame()">MISSION START</button>
        <div style="margin-top:20px; color:var(--gold); font-size:0.8rem;">V41.0 [FINAL CORE] // SYSTEM FIXED</div>
    </div>

    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>

    <div id="boss-ui">
        <div id="boss-label" style="color:var(--pink); font-size:0.8rem; margin-bottom:8px; font-weight:bold; letter-spacing:3px;">BOSS CORE DETECTED</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    
    let width, height, centerX, centerY, player, bullets = [], enemies = [], stars = [], particles = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bossTrigger = 3000;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = init;
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2; centerY = height / 2;
        player = { x: centerX, y: height - 180, tx: centerX, ty: height - 180 };
        stars = Array(150).fill().map(() => ({ x: Math.random()*width-centerX, y: Math.random()*height-centerY, z: Math.random()*width }));
    }

    function startGame() {
        document.getElementById('launcher').style.transform = 'translateY(-100%)';
        document.getElementById('hud').style.visibility = 'visible';
        isPlaying = true; render();
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return; e.preventDefault();
        player.tx = Math.max(60, Math.min(width-60, e.touches[0].clientX));
        player.ty = Math.max(150, Math.min(height-100, e.touches[0].clientY - 80));
    }, { passive: false });

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y; this.scale = 1.0;
            this.vx = (centerX - x) * 0.09; this.vy = (centerY - y) * 0.09;
            this.active = true;
        }
        draw() {
            this.x += this.vx; this.y += this.vy; this.scale *= 0.93;
            if(this.scale < 0.05) this.active = false;
            ctx.fillStyle = `rgba(255, 255, 255, ${this.scale + 0.3})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 8 * this.scale, 0, Math.PI*2); ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 12; this.vy = (Math.random() - 0.5) * 12;
            this.life = 1.0;
        }
        draw() {
            this.x += this.vx; this.y += this.vy; this.life -= 0.05;
            ctx.fillStyle = this.color; ctx.globalAlpha = Math.max(0, this.life);
            ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss; this.angle = Math.random() * Math.PI * 2;
            this.dist = 0; this.scale = 0.01;
            this.hp = isBoss ? 200 : 1; this.maxHp = this.hp;
            this.active = true; this.phase = 0; this.hitFlash = 0;
            this.cx = 0; this.cy = 0;
        }
        update() {
            this.scale *= (this.isBoss ? 1.009 : 1.04);
            if(this.isBoss && this.scale > 0.8) {
                this.scale = 0.8; this.phase += 0.015;
                this.cx = centerX + Math.cos(this.phase) * (Math.sin(this.phase * 2) * 300);
                this.cy = centerY + Math.sin(this.phase) * 120;
            } else {
                this.dist += (this.scale * 20);
                this.cx = centerX + Math.cos(this.angle) * this.dist;
                this.cy = centerY + Math.sin(this.angle) * this.dist;
            }
            // [해결] 보스 전용 GC: 보스가 하단으로 사라지면 변수 초기화
            if(this.scale > 2.5) {
                this.active = false;
                if(this.isBoss) {
                    boss = null;
                    document.getElementById('boss-ui').style.display = 'none';
                    bossTrigger = score + 5000; // 다음 보스 점수 재설정
                }
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            if(this.hitFlash > 0) { ctx.filter = 'brightness(5)'; this.hitFlash--; }
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ffff';
            ctx.lineWidth = 4; ctx.strokeRect(-45, -45, 90, 90);
            ctx.restore();
        }
    }

    function render() {
        if(!isPlaying) return;
        frame++; ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);

        stars.forEach(s => {
            s.z -= 20; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + centerX; let y = (s.y / s.z) * height + centerY;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`; ctx.fillRect(x, y, 2, 2);
        });

        if(frame % 7 === 0) bullets.push(new Bullet(player.x-40, player.y), new Bullet(player.x+40, player.y));
        bullets = bullets.filter(b => b.active);
        bullets.forEach(b => b.draw());

        if(frame % 50 === 0 && !boss) enemies.push(new Enemy());
        if(score >= bossTrigger && !boss) {
            boss = new Enemy(true); enemies.push(boss);
            document.getElementById('boss-ui').style.display = 'block';
            document.getElementById('hp-bar').style.width = '100%';
        }

        enemies.forEach((e, ei) => {
            e.update(); e.draw();

            // 충돌 감지 (플레이어 피격)
            if(e.active && e.scale > 0.8 && e.scale < 1.3) {
                if(Math.hypot(e.cx - player.x, e.cy - player.y) < 70) {
                    hp -= e.isBoss ? 40 : 15;
                    document.getElementById('hp-val').innerText = Math.max(0, hp);
                    if(hp <= 0) location.reload();
                    if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; bossTrigger = score + 5000; }
                    enemies.splice(ei, 1);
                    return;
                }
            }

            // [업데이트] 모든 몹 타격 시 파티클 생성 로직
            bullets.forEach((b, bi) => {
                let hitBox = e.isBoss ? 160 : 90;
                if(e.active && b.active && Math.hypot(e.cx - b.x, e.cy - b.y) < hitBox * e.scale) {
                    e.hp--; e.hitFlash = 3;
                    // 일반몹/보스 공통 파티클 생성
                    for(let i=0; i<4; i++) {
                        particles.push(new Particle(b.x, b.y, e.isBoss ? '#ff00ff' : '#00ffff'));
                    }
                    bullets.splice(bi, 1);

                    if(e.isBoss) {
                        let hpPercent = (e.hp / e.maxHp) * 100;
                        document.getElementById('hp-bar').style.width = hpPercent + '%';
                    }

                    if(e.hp <= 0) {
                        score += e.isBoss ? 5000 : 100;
                        document.getElementById('score-val').innerText = score.toLocaleString();
                        if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; bossTrigger = score + 10000; }
                        enemies.splice(ei, 1);
                    }
                }
            });

            if(!e.active) enemies.splice(ei, 1);
        });

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => p.draw());

        player.x += (player.tx - player.x) * 0.2; player.y += (player.ty - player.y) * 0.2;
        if(assets.player.complete) ctx.drawImage(assets.player, player.x-60, player.y-60, 120, 120);

        requestAnimationFrame(render);
    }
</script>
</body>
</html>
