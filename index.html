<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER - PLAY</title>
    <style>
        :root { --neon-mint: #00ffcc; --neon-pink: #ff00ff; --overlay: rgba(0, 0, 0, 0.8); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* 공통 배경 */
        .bg-layer { position: fixed; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }

        /* 화면 세션 (상태 관리용) */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px 20px; z-index: 10; color: white; }
        .active { display: flex; }

        /* UI 요소 */
        h1 { color: var(--neon-mint); text-shadow: 0 0 15px var(--neon-mint); font-size: 3rem; font-style: italic; }
        .panel { background: rgba(255, 255, 255, 0.05); border: 2px solid var(--neon-pink); border-radius: 20px; padding: 20px; width: 100%; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); text-align: center; }
        .btn { padding: 20px 50px; background: transparent; border: 2px solid var(--neon-mint); color: var(--neon-mint); font-weight: bold; font-size: 1.2rem; border-radius: 40px; box-shadow: 0 0 15px var(--neon-mint); cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: var(--neon-mint); color: #000; }

        /* 게임 캔버스 */
        #gameCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        #ingame-ui { position: fixed; top: 20px; left: 20px; z-index: 20; color: var(--neon-mint); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px #000; display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div class="bg-layer" id="mainBg"></div>
    
    <div id="screen-main" class="screen active">
        <h1>NEON SHOOTER</h1>
        <div class="panel">
            <h3 style="color:var(--neon-pink); margin:0;">GLOBAL RANKING</h3>
            <div id="rank-display" style="margin-top:15px; font-size:1rem; line-height:1.6;">서버 연결 중...</div>
        </div>
        <button class="btn" onclick="startGame()">MISSION START</button>
    </div>

    <div id="ingame-ui">SCORE: <span id="currentScore">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div id="screen-result" class="screen">
        <h1>MISSION CLEAR</h1>
        <div class="panel">
            <p>당신의 점수</p>
            <h2 id="finalScore" style="font-size: 3rem; color: var(--neon-mint); margin: 10px 0;">0</h2>
            <p id="sync-status" style="color:var(--neon-pink);">데이터 동기화 중...</p>
        </div>
        <button class="btn" onclick="location.reload()">MAIN MENU</button>
    </div>

    <script>
        const API_URL =  "https://te3hlwv09c.execute-api.ap-northeast-2.amazonaws.com/default/";
        
        // 게임 상태 변수
        let canvas, ctx;
        let score = 0;
        let isPlaying = false;
        let player, enemies = [], particles = [];

        // 1. 초기화 및 배경 설정
        function init() {
            const hour = new Date().getHours();
            const bg = (hour >= 2 && hour <= 6) ? "url('assets/bg_dawn.png')" : "url('assets/bg_night.png')";
            document.getElementById('mainBg').style.backgroundImage = bg;
            fetchRanking(); // 시작 시 랭킹 불러오기
        }

        // 2. 랭킹 데이터 가져오기 (AWS 연동)
        async function fetchRanking() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const display = document.getElementById('rank-display');
                display.innerHTML = data.rankers.map((r, i) => `${i+1}. ${r.nickname || 'Unknown'} - ${r.score}`).join('<br>');
            } catch (e) {
                console.error(e);
            }
        }

        // 3. 게임 시작 로직 (화면 전환)
        function startGame() {
            document.getElementById('screen-main').classList.remove('active');
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ingame-ui').style.display = 'block';
            
            setupCanvas();
            score = 0;
            isPlaying = true;
            enemies = [];
            animate();
            
            // 15초 뒤 게임 종료 (테스트용)
            setTimeout(endGame, 15000);
        }

        // 4. 슈팅 게임 로직 (Canvas 엔진)
        function setupCanvas() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            player = { x: canvas.width/2, y: canvas.height - 80, size: 30 };
            
            // 터치/클릭으로 총 쏘기
            canvas.onclick = (e) => {
                if(!isPlaying) return;
                checkHit(e.clientX, e.clientY);
            };
        }

        function animate() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 적 생성 및 그리기
            if(Math.random() < 0.05) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, speed: 3 + Math.random()*5 });
            }
            
            ctx.fillStyle = "#ff00ff";
            enemies.forEach((en, index) => {
                en.y += en.speed;
                ctx.beginPath();
                ctx.arc(en.x, en.y, 20, 0, Math.PI*2);
                ctx.fill();
                
                if(en.y > canvas.height) enemies.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        function checkHit(tx, ty) {
            enemies.forEach((en, index) => {
                const dist = Math.sqrt((en.x - tx)**2 + (en.y - ty)**2);
                if(dist < 40) {
                    enemies.splice(index, 1);
                    score += 100;
                    document.getElementById('currentScore').innerText = score;
                }
            });
        }

        // 5. 게임 종료 및 데이터 전송 (3번 화면 전환)
        async function endGame() {
            isPlaying = false;
            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('ingame-ui').style.display = 'none';
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('finalScore').innerText = score;

            // 여기서 실제 AWS Lambda로 POST 요청을 보내 점수를 저장해야 함
            // (다음 단계에서 Lambda 업데이트 후 연동 예정)
            document.getElementById('sync-status').innerText = "최종 점수가 기록되었습니다!";
        }

        init();
    </script>
</body>
</html>
