<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v0.47 - RANK SYSTEM</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; color: white; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        
        /* 런처 및 랭킹 UI */
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); transition: 0.5s; }
        .main-btn { padding: 18px 60px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 50px; font-weight: bold; font-size: 1.4rem; cursor: pointer; box-shadow: 0 0 20px var(--mint); transition: 0.3s; letter-spacing: 3px; margin-bottom: 20px; }
        
        #rank-board { width: 300px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .rank-item.top { color: var(--gold); font-weight: bold; }

        /* 게임 중 HUD */
        #hud { position: absolute; top: 0; width: 100%; padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; }
        .hud-box { background: rgba(0, 0, 0, 0.7); border: 2px solid var(--mint); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; }
        #exit-btn { background: rgba(255, 0, 255, 0.2); border: 2px solid var(--pink); color: var(--pink); padding: 10px 20px; border-radius: 20px; font-weight: bold; pointer-events: auto; cursor: pointer; }

        #boss-ui { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 80%; display: none; }
        .hp-container { height: 10px; background: rgba(255, 0, 255, 0.1); border: 1px solid var(--pink); border-radius: 10px; overflow: hidden; }
        #hp-bar { height: 100%; background: var(--pink); width: 100%; transition: width 0.1s; }
        #damage-flash { position: absolute; inset: 0; background: rgba(255, 0, 0, 0.2); display: none; pointer-events: none; z-index: 50; }
        
        .loading-text { font-size: 0.8rem; color: var(--mint); animate: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>
<div id="damage-flash"></div>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <div style="color:var(--mint); font-size:2.5rem; margin-bottom:20px; text-shadow:0 0 20px var(--mint);">RANKING BOARD</div>
        
        <div id="rank-board">
            <div id="rank-list"><div class="loading-text">LOADING CLOUD DATA...</div></div>
        </div>

        <input type="text" id="player-id" style="background:none; border:2px solid var(--mint); border-radius:15px; padding:12px; color:white; text-align:center; width:220px; margin-bottom:20px; font-size:1rem;" value="PILOT_01">
        <button class="main-btn" onclick="startGame()">MISSION START</button>
        <div style="color:rgba(255,255,255,0.4); font-size:0.7rem;">v0.47 // AWS ap-northeast-2 sync</div>
    </div>

    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div id="exit-btn" onclick="endGame()">EXIT & SAVE</div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>

    <div id="boss-ui">
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const API_URL = "https://te3hlwv09c.execute-api.ap-northeast-2.amazonaws.com/default/";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    
    let width, height, centerX, centerY, player, bullets = [], enemies = [], stars = [], particles = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bossTrigger = 3000;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = () => {
            init();
            fetchRankings(); // 시작 시 랭킹 로드
        };
    }

    async function fetchRankings() {
        const rankList = document.getElementById('rank-list');
        try {
            const response = await fetch(API_URL); // GET 요청
            const data = await response.json();
            rankList.innerHTML = "";
            
            // 데이터가 배열로 온다고 가정 (상위 5명)
            if(data && data.length > 0) {
                data.slice(0, 5).forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = `rank-item ${index === 0 ? 'top' : ''}`;
                    div.innerHTML = `<span>${index+1}. ${item.ns_pilot_id}</span><span>${parseInt(item.ns_score).toLocaleString()}</span>`;
                    rankList.appendChild(div);
                });
            } else {
                rankList.innerHTML = "<div style='font-size:0.8rem'>NO RECORD FOUND</div>";
            }
        } catch (e) {
            rankList.innerHTML = "<div style='font-size:0.8rem; color:red;'>SYNC ERROR</div>";
        }
    }

    async function syncScoreToAWS(pilotId, finalScore) {
        if(finalScore < 100) return; // 최소 기록 미달 시 패스
        try {
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    ns_pilot_id: pilotId,
                    ns_score: finalScore,
                    ns_updated_at: new Date().toISOString()
                })
            });
        } catch (error) { console.error("Sync Failed", error); }
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2; centerY = height / 2;
        player = { x: centerX, y: height - 180, tx: centerX, ty: height - 180 };
        stars = Array(150).fill().map(() => ({ x: Math.random()*width-centerX, y: Math.random()*height-centerY, z: Math.random()*width }));
    }

    function startGame() {
        document.getElementById('launcher').style.transform = 'translateY(-100%)';
        document.getElementById('hud').style.visibility = 'visible';
        isPlaying = true; render();
    }

    function endGame() {
        if(!isPlaying) return;
        isPlaying = false;
        const pid = document.getElementById('player-id').value || "ANON";
        
        // UI 즉시 변경 (중복 클릭 방지)
        document.getElementById('exit-btn').innerText = "SAVING...";
        
        syncScoreToAWS(pid, score).then(() => {
            alert(`MISSION ENDED\nPILOT: ${pid}\nSCORE: ${score}`);
            location.reload();
        });
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return; e.preventDefault();
        player.tx = Math.max(60, Math.min(width-60, e.touches[0].clientX));
        player.ty = Math.max(150, Math.min(height-100, e.touches[0].clientY - 80));
    }, { passive: false });

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y; this.scale = 1.0;
            this.vx = (centerX - x) * 0.09; this.vy = (centerY - y) * 0.09;
            this.active = true;
        }
        draw() {
            this.x += this.vx; this.y += this.vy; this.scale *= 0.93;
            if(this.scale < 0.05) { this.active = false; return; }
            ctx.fillStyle = `rgba(255, 255, 255, ${this.scale + 0.3})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 8 * this.scale, 0, Math.PI*2); ctx.fill();
        }
    }

    class TextParticle {
        constructor(x, y, text) { this.x = x; this.y = y; this.text = text; this.life = 1.0; }
        draw() {
            this.y -= 1; this.life -= 0.03;
            ctx.fillStyle = `rgba(0, 255, 204, ${this.life})`;
            ctx.font = "bold 16px Arial";
            ctx.fillText(this.text, this.x, this.y);
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss; this.angle = Math.random() * Math.PI * 2;
            this.progress = 0; this.scale = 0.01;
            this.hp = isBoss ? 250 : 1; this.maxHp = this.hp;
            this.active = true; this.phase = 0; this.hitFlash = 0;
        }
        update() {
            this.progress += (this.isBoss ? 0.004 : 0.015); 
            this.scale = this.progress * 2; 
            if(this.isBoss && this.scale > 0.8) {
                this.scale = 0.8;
                let pSpeed = (this.hp < 125) ? 0.03 : 0.015;
                this.phase += pSpeed;
                this.cx = centerX + Math.cos(this.phase) * (Math.sin(this.phase * 2) * 320);
                this.cy = centerY + Math.sin(this.phase) * 140;
            } else {
                let dist = this.progress * (width * 0.8);
                this.cx = centerX + Math.cos(this.angle) * dist;
                this.cy = centerY + Math.sin(this.angle) * dist;
            }
            if(this.scale > 1.8) this.active = false;
        }
        draw() {
            if(!this.active || this.scale > 1.5) return;
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            if(this.hitFlash > 0) { ctx.filter = 'brightness(5)'; this.hitFlash--; }
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ffff';
            ctx.lineWidth = 5; ctx.strokeRect(-45, -45, 90, 90);
            ctx.restore(); ctx.filter = 'none';
        }
    }

    function render() {
        if(!isPlaying) return;
        frame++; ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);

        stars.forEach(s => {
            s.z -= (boss ? 40 : 20); if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + centerX; let y = (s.y / s.z) * height + centerY;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`; ctx.fillRect(x, y, 2, 2);
        });

        if(frame % 7 === 0) bullets.push(new Bullet(player.x-40, player.y), new Bullet(player.x+40, player.y));
        bullets = bullets.filter(b => b.active); bullets.forEach(b => b.draw());

        if(frame % 50 === 0 && !boss) enemies.push(new Enemy());
        if(score >= bossTrigger && !boss) {
            boss = new Enemy(true); enemies.push(boss);
            document.getElementById('boss-ui').style.display = 'block';
            document.getElementById('hp-bar').style.width = '100%';
        }

        enemies.forEach((e, ei) => {
            e.update(); e.draw();
            if(e.active && e.scale > 0.8 && e.scale < 1.2) {
                if(Math.hypot(e.cx - player.x, e.cy - player.y) < 75) {
                    hp -= e.isBoss ? 40 : 15;
                    document.getElementById('hp-val').innerText = Math.max(0, hp);
                    document.getElementById('damage-flash').style.display = 'block';
                    setTimeout(() => document.getElementById('damage-flash').style.display = 'none', 100);
                    if(hp <= 0) endGame();
                    if(e.isBoss) resetBoss();
                    enemies.splice(ei, 1); return;
                }
            }
            bullets.forEach((b, bi) => {
                let hitBox = e.isBoss ? 170 : 100;
                if(e.active && b.active && Math.hypot(e.cx - b.x, e.cy - b.y) < hitBox * e.scale) {
                    e.hp--; e.hitFlash = 3; bullets.splice(bi, 1);
                    if(e.isBoss) document.getElementById('hp-bar').style.width = (e.hp/e.maxHp)*100 + '%';
                    if(e.hp <= 0) {
                        let addScore = e.isBoss ? 5000 : 100;
                        score += addScore;
                        particles.push(new TextParticle(e.cx, e.cy, `+${addScore}`));
                        document.getElementById('score-val').innerText = score.toLocaleString();
                        if(e.isBoss) resetBoss();
                        enemies.splice(ei, 1);
                    }
                }
            });
            if(!e.active) { if(e.isBoss) resetBoss(30); enemies.splice(ei, 1); }
        });

        particles = particles.filter(p => p.life > 0); particles.forEach(p => p.draw());
        player.x += (player.tx - player.x) * 0.22; player.y += (player.ty - player.y) * 0.22;
        if(assets.player.complete) ctx.drawImage(assets.player, player.x-60, player.y-60, 120, 120);
        requestAnimationFrame(render);
    }

    function resetBoss(penalty = 0) {
        boss = null; document.getElementById('boss-ui').style.display = 'none';
        if(penalty > 0) { hp -= penalty; document.getElementById('hp-val').innerText = Math.max(0, hp); if(hp <= 0) endGame(); }
        bossTrigger = score + 7000;
    }
</script>
</body>
</html>
