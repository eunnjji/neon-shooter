<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v0.76</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 5; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .main-btn { padding: 20px 60px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 15px var(--mint); letter-spacing: 2px; }
        #rank-board { width: 280px; background: rgba(0, 255, 204, 0.1); border: 1px solid var(--mint); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #hud { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; z-index: 150; }
        .hud-box { background: rgba(0,0,0,0.6); border: 1px solid var(--mint); padding: 8px 15px; border-radius: 10px; }
        #damage-flash { position: absolute; inset: 0; background: rgba(255, 0, 0, 0.4); display: none; z-index: 50; }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>
<div id="damage-flash"></div>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <h2 style="color:var(--mint); margin-bottom:20px;">NEON_SHOOTER_v76</h2>
        <div id="rank-board">
            <div id="rank-list">LOADING_RANK...</div>
        </div>
        <input type="text" id="player-id" style="background:#222; border:1px solid var(--mint); color:white; padding:10px; border-radius:10px; width:180px; text-align:center; margin-bottom:20px;" value="PILOT_01">
        <button class="main-btn" onclick="startGame()">MISSION START</button>
    </div>

    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>
</div>

<script>
    const API_URL = "https://te3hlwv09c.execute-api.ap-northeast-2.amazonaws.com/default/";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    let width, height, player, bullets = [], enemies = [], stars = [], frame = 0, score = 0, hp = 100, isPlaying = false;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        resize();
        fetchRankings();
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    async function fetchRankings() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const items = Array.isArray(data) ? data : (data.Items || []);
            document.getElementById('rank-list').innerHTML = items.sort((a,b)=>Number(b.ns_score)-Number(a.ns_score)).slice(0, 3).map((item, i) => 
                `<div class="rank-item"><span>${i+1}. ${item.ns_pilot_id}</span><span>${item.ns_score}</span></div>`
            ).join('') || "EMPTY";
        } catch (e) { document.getElementById('rank-list').innerHTML = "OFFLINE"; }
    }

    function startGame() {
        resize();
        document.getElementById('launcher').style.display = 'none';
        document.getElementById('hud').style.visibility = 'visible';
        player = { x: width/2, y: height-120, tx: width/2, ty: height-120 };
        stars = Array(80).fill().map(() => ({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2 }));
        isPlaying = true;
        render();
    }

    async function endGame() {
        isPlaying = false;
        try {
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ns_pilot_id: document.getElementById('player-id').value, ns_score: score })
            });
        } catch(e) {}
        location.reload();
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return;
        e.preventDefault();
        player.tx = e.touches[0].clientX;
        player.ty = e.touches[0].clientY - 50;
    }, { passive: false });

    function render() {
        if(!isPlaying) return;
        frame++;
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,width,height);
        
        stars.forEach(s => {
            s.y += 1.5; if(s.y > height) s.y = 0;
            ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        player.x += (player.tx - player.x) * 0.15;
        player.y += (player.ty - player.y) * 0.15;
        
        if(assets.player.complete) {
            ctx.drawImage(assets.player, player.x-35, player.y-35, 70, 70);
        } else {
            ctx.fillStyle = '#00ffcc'; ctx.fillRect(player.x-20, player.y-20, 40, 40);
        }

        if(frame % 60 === 0) enemies.push({ x: Math.random()*width, y: -40 });

        enemies.forEach((e, i) => {
            e.y += 3.5;
            ctx.strokeStyle = '#00ffcc'; ctx.strokeRect(e.x-15, e.y-15, 30, 30);
            if(Math.hypot(e.x-player.x, e.y-player.y) < 40) {
                hp -= 10; enemies.splice(i, 1);
                document.getElementById('hp-val').innerText = hp;
                document.getElementById('damage-flash').style.display='block';
                setTimeout(()=>document.getElementById('damage-flash').style.display='none', 50);
                if(hp <= 0) endGame();
            }
            if(e.y > height) { enemies.splice(i, 1); score += 10; document.getElementById('score-val').innerText = score; }
        });

        requestAnimationFrame(render);
    }
    window.addEventListener('resize', resize);
</script>
</body>
</html>
