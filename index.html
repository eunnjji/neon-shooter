<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER - FINAL VER</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 레이어 */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; font-family: sans-serif; }
        .hud { padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; color: var(--mint); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px var(--mint); }
        
        /* 보스 경고 및 체력바 */
        #boss-ui { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; display: none; text-align: center; }
        .boss-warning { color: var(--pink); font-size: 1.5rem; font-weight: 900; animation: blink 0.5s infinite; margin-bottom: 10px; }
        .hp-container { height: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--pink); border-radius: 6px; overflow: hidden; box-shadow: 0 0 15px var(--pink); }
        #hp-bar { height: 100%; background: var(--pink); width: 100%; transition: width 0.1s; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span></div>
    </div>
    <div id="boss-ui">
        <div class="boss-warning">BOSS APPROACHING</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgImg = new Image();
    bgImg.src = 'assets/bg_night.png'; // 준비된 Assets 사용

    let width, height, player, bullets = [], enemies = [], particles = [], boss = null;
    let score = 0, hp = 100, frame = 0, bgOffset = 0;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = { x: width / 2, y: height - 100, targetX: width / 2, targetY: height - 150 };
    }

    // 터치 및 드래그 보정 (Off-set 적용)
    const handleInput = (x, y) => {
        player.targetX = x;
        player.targetY = y - 70; // 손가락 위로 기체 배치 (UX 개선)
    };
    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));

    class Bullet {
        constructor(x, y) { this.x = x; this.y = y; this.v = 15; }
        draw() {
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10; ctx.shadowColor = var(--mint);
            ctx.fillRect(this.x - 2, this.y, 4, 15);
            this.y -= this.v;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.x = isBoss ? width / 2 : Math.random() * (width - 60) + 30;
            this.y = -100;
            this.hp = isBoss ? 50 : 1;
            this.size = isBoss ? 80 : 25;
            this.v = isBoss ? 0.5 : 4;
        }
        draw() {
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#ff4444';
            ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = ctx.strokeStyle;
            ctx.strokeRect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
            this.y += this.v;
            if (this.isBoss) {
                this.x += Math.sin(frame * 0.05) * 5;
                document.getElementById('boss-ui').style.display = 'block';
                document.getElementById('hp-bar').style.width = (this.hp / 50) * 100 + '%';
            }
        }
    }

    function render() {
        frame++;
        ctx.clearRect(0, 0, width, height);

        // [배경 전문가] Looping Background
        bgOffset += 2;
        if (bgOffset > height) bgOffset = 0;
        ctx.drawImage(bgImg, 0, bgOffset - height, width, height);
        ctx.drawImage(bgImg, 0, bgOffset, width, height);

        // 플레이어 이동 보간 (Smoothness)
        player.x += (player.targetX - player.x) * 0.15;
        player.y += (player.targetY - player.y) * 0.15;

        // 플레이어 (기획 이미지 스타일 네온 기체)
        ctx.strokeStyle = '#00ffcc'; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 40);
        ctx.lineTo(player.x - 30, player.y + 20);
        ctx.lineTo(player.x + 30, player.y + 20);
        ctx.closePath(); ctx.stroke();

        // 사격 및 충돌 로직
        if (frame % 7 === 0) bullets.push(new Bullet(player.x, player.y - 40));
        bullets.forEach((b, bi) => {
            b.draw();
            if (b.y < -20) bullets.splice(bi, 1);
        });

        enemies.forEach((e, ei) => {
            e.draw();
            bullets.forEach((b, bi) => {
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.size + 10) {
                    e.hp--; bullets.splice(bi, 1);
                    if (e.hp <= 0) {
                        score += e.isBoss ? 5000 : 100;
                        if (e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; }
                        enemies.splice(ei, 1);
                        document.getElementById('score').innerText = score.toLocaleString();
                    }
                }
            });
            if (e.y > height + 100) enemies.splice(ei, 1);
        });

        if (frame % 60 === 0 && !boss) enemies.push(new Enemy());
        if (score >= 2000 && !boss) { boss = new Enemy(true); enemies.push(boss); }

        requestAnimationFrame(render);
    }

    init();
    bgImg.onload = render;
    window.onresize = init;
</script>
</body>
</html>
