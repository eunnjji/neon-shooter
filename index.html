<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v38.0 - INTEGRITY</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; }
        .interactive { pointer-events: auto; }
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(40px); transition: 0.8s; }
        .main-btn { padding: 22px 100px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 60px; font-weight: bold; font-size: 1.7rem; cursor: pointer; box-shadow: 0 0 40px var(--mint); transition: 0.3s; letter-spacing: 5px; }
        #hud { position: absolute; top: 0; width: 100%; padding: env(safe-area-inset-top) 25px 0; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; }
        .hud-box { background: rgba(0, 0, 0, 0.7); border: 2.5px solid var(--mint); padding: 15px 35px; border-radius: 30px; box-shadow: 0 0 30px var(--mint); }
        #boss-ui { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 85%; display: none; text-align: center; }
        .hp-container { height: 18px; background: rgba(255, 0, 255, 0.1); border: 2.5px solid var(--pink); border-radius: 30px; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--pink), #fff); width: 100%; }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <div style="color:var(--mint); font-size:4rem; font-style:italic; text-shadow:0 0 50px var(--mint); margin-bottom:50px;">INTEGRITY</div>
        <button class="main-btn" onclick="startGame()">MISSION START</button>
        <div style="margin-top:20px; color:var(--gold); font-size:0.8rem;">V38.0 READY FOR DB UPDATE</div>
    </div>

    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>

    <div id="boss-ui">
        <div style="color:var(--pink); font-size:0.9rem; margin-bottom:10px; font-weight:bold;">BOSS ENTITY ACTIVE</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    
    let width, height, centerX, centerY, player, bullets = [], enemies = [], stars = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bossTrigger = 5000;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = init;
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2; centerY = height / 2;
        player = { x: centerX, y: height - 180, tx: centerX, ty: height - 180 };
        stars = Array(150).fill().map(() => ({ x: Math.random()*width-centerX, y: Math.random()*height-centerY, z: Math.random()*width }));
    }

    function startGame() {
        document.getElementById('launcher').style.transform = 'translateY(-100%)';
        document.getElementById('hud').style.visibility = 'visible';
        isPlaying = true; render();
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return; e.preventDefault();
        player.tx = Math.max(60, Math.min(width-60, e.touches[0].clientX));
        player.ty = Math.max(150, Math.min(height-100, e.touches[0].clientY - 80));
    }, { passive: false });

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y; this.scale = 1.0;
            this.vx = (centerX - x) * 0.09; this.vy = (centerY - y) * 0.09;
            this.active = true;
        }
        draw() {
            this.x += this.vx; this.y += this.vy; this.scale *= 0.93;
            if(this.scale < 0.05) { this.active = false; return; }
            ctx.fillStyle = `rgba(255, 255, 255, ${this.scale + 0.3})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 8 * this.scale, 0, Math.PI*2); ctx.fill();
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss; this.angle = Math.random() * Math.PI * 2;
            this.dist = 0; this.scale = 0.01;
            this.hp = isBoss ? 500 : 1; this.maxHp = this.hp; this.active = true;
        }
        update() {
            this.scale *= (this.isBoss ? 1.011 : 1.055);
            if(this.isBoss && this.scale > 0.85) {
                this.scale = 0.85; this.angle += (this.hp < 150 ? 0.07 : 0.035);
                this.dist = 280 + Math.sin(frame*0.05)*70;
            } else { this.dist += (this.scale * 24); }
            this.cx = centerX + Math.cos(this.angle) * this.dist;
            this.cy = centerY + Math.sin(this.angle) * this.dist;
            
            // [해결] 잔상 방지: 화면을 완전히 벗어나기 전 드로잉 중단
            if(this.scale > 3) this.active = false;
        }
        draw() {
            if(!this.active) return;
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ffff';
            ctx.lineWidth = 5; ctx.strokeRect(-45, -45, 90, 90);
            ctx.restore();
        }
    }

    function render() {
        if(!isPlaying) return;
        frame++;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);

        stars.forEach(s => {
            s.z -= 30; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + centerX;
            let y = (s.y / s.z) * height + centerY;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`;
            ctx.fillRect(x, y, 2, 2);
        });

        if(frame % 7 === 0) bullets.push(new Bullet(player.x-40, player.y), new Bullet(player.x+40, player.y));
        bullets = bullets.filter(b => b.active);
        bullets.forEach(b => b.draw());

        if(frame % 40 === 0 && !boss) enemies.push(new Enemy());
        if(score >= bossTrigger && !boss) {
            boss = new Enemy(true); enemies.push(boss);
            document.getElementById('boss-ui').style.display = 'block';
        }

        enemies.forEach((e, ei) => {
            e.update(); e.draw();

            // 충돌 판정
            if(e.active && e.scale > 0.8 && e.scale < 1.2) {
                if(Math.hypot(e.cx - player.x, e.cy - player.y) < 70) {
                    hp -= 20; document.getElementById('hp-val').innerText = Math.max(0, hp);
                    if(hp <= 0) onGameOver();
                    if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; }
                    enemies.splice(ei, 1);
                }
            }

            // 탄환 타격
            bullets.forEach((b, bi) => {
                if(e.active && b.active && Math.hypot(e.cx - b.x, e.cy - b.y) < (e.isBoss ? 150 : 80) * e.scale) {
                    e.hp--; bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        score += e.isBoss ? 30000 : 100;
                        if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; bossTrigger += 15000; }
                        enemies.splice(ei, 1);
                        document.getElementById('score-val').innerText = score;
                    }
                }
            });

            // 보스를 놓쳤을 때 (Penalty Logic)
            if(!e.active) {
                if(e.isBoss) { 
                    boss = null; 
                    document.getElementById('boss-ui').style.display = 'none'; 
                    hp -= 30; // 보스 놓치면 HP 대폭 감소 패널티
                    document.getElementById('hp-val').innerText = Math.max(0, hp);
                    if(hp <= 0) onGameOver();
                    bossTrigger += 5000; 
                }
                enemies.splice(ei, 1);
            }
        });

        player.x += (player.tx - player.x) * 0.2;
        player.y += (player.ty - player.y) * 0.2;
        if(assets.player.complete) ctx.drawImage(assets.player, player.x-60, player.y-60, 120, 120);

        requestAnimationFrame(render);
    }

    function onGameOver() {
        isPlaying = false;
        alert(`MISSION FAILED\nFINAL SCORE: ${score}`);
        // [DBA 가이드] 여기서 AWS API를 호출하여 { pilotId: "MASTER", score: score }를 전송하십시오.
        location.reload();
    }
</script>
</body>
</html>
