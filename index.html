<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER - EXTREME EDITION</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --cyan: #00ffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; filter: saturate(1.5) contrast(1.2); }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; font-family: 'Arial Black', sans-serif; }
        .hud { padding: env(safe-area-inset-top) 25px 0; display: flex; justify-content: space-between; color: var(--mint); font-size: 1.4rem; text-shadow: 0 0 15px var(--mint); }
        
        #boss-warning { position: absolute; top: 40%; left: 0; width: 100%; background: rgba(255, 0, 255, 0.2); color: var(--pink); text-align: center; padding: 20px 0; font-size: 2rem; font-weight: 900; display: none; border-top: 2px solid var(--pink); border-bottom: 2px solid var(--pink); z-index: 100; animation: blink 0.3s infinite; }
        #boss-hp-ui { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 80%; display: none; }
        .hp-outer { height: 15px; background: rgba(0,0,0,0.8); border: 2px solid var(--pink); border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px var(--pink); }
        #hp-inner { height: 100%; background: linear-gradient(90deg, #ff00ff, #ff88ff); width: 100%; transition: width 0.1s; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="boss-warning">WARNING: BOSS DETECTED</div>

<div id="ui-layer">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>LV. <span id="lv">1</span></div>
    </div>
    <div id="boss-hp-ui">
        <div class="hp-outer"><div id="hp-inner"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 리소스 준비
    const bgImg = new Image(); bgImg.src = './assets/bg_night.png';
    const playerImg = new Image(); playerImg.src = './assets/player_ship.png'; // 비행기 에셋 필요

    let width, height, player, bullets = [], enemies = [], stars = [], frame = 0, bgOffset = 0;
    let score = 0, isBossActive = false, shakeTime = 0;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = player || { x: width/2, y: height-150, tx: width/2, ty: height-150, angle: 0 };
    }

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        player.tx = e.touches[0].clientX;
        player.ty = e.touches[0].clientY - 80;
    }, { passive: false });

    class Bullet {
        constructor(x, y) { this.x = x; this.y = y; }
        update() { this.y -= 20; }
        draw() {
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff';
            ctx.fillRect(this.x - 3, this.y, 6, 20);
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.x = isBoss ? width / 2 : Math.random() * (width - 100) + 50;
            this.y = -200;
            this.hp = isBoss ? 100 : 1;
            this.size = isBoss ? 100 : 30;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            if(this.isBoss) {
                // [건담 스타일 보스] 육각형 및 프레임 렌더링
                ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 5; ctx.shadowBlur = 30; ctx.shadowColor = '#ff00ff';
                ctx.beginPath();
                for(let i=0; i<6; i++) {
                    let a = i * Math.PI / 3 + frame * 0.02;
                    ctx.lineTo(Math.cos(a) * this.size, Math.sin(a) * this.size);
                }
                ctx.closePath(); ctx.stroke();
                // 코어 눈
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = '#ff3333';
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
            }
            ctx.restore();
            this.y += this.isBoss ? 0.5 : 5;
        }
    }

    function render() {
        frame++;
        if (shakeTime > 0) {
            ctx.save();
            ctx.translate(Math.random()*10 - 5, Math.random()*10 - 5);
            shakeTime--;
        }

        // 1. 배경 (Assets + 스피드라인)
        bgOffset += 10; if(bgOffset >= height) bgOffset = 0;
        ctx.drawImage(bgImg, 0, bgOffset - height, width, height);
        ctx.drawImage(bgImg, 0, bgOffset, width, height);
        
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
        for(let i=0; i<5; i++) { // 스피드 라인 효과
            let lx = (i * width / 5) + (frame % 50);
            ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, height); ctx.stroke();
        }

        // 2. 플레이어 (에셋 기반 + 틸팅)
        let dx = player.tx - player.x;
        player.x += dx * 0.15;
        player.y += (player.ty - player.y) * 0.15;
        player.angle = dx * 0.05; // 이동 방향으로 기울기

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.shadowBlur = 25; ctx.shadowColor = '#00ffff';
        // 에셋이 있으면 에셋을 그리고, 없으면 간지나는 네온 비행기를 그림
        if (playerImg.complete) {
            ctx.drawImage(playerImg, -40, -40, 80, 80);
        } else {
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(-30, 30); ctx.lineTo(0, 10); ctx.lineTo(30, 30); ctx.closePath(); ctx.stroke();
        }
        ctx.restore();

        // 3. 전투 로직
        if(frame % 6 === 0) bullets.push(new Bullet(player.x, player.y - 40));
        bullets.forEach((b, i) => {
            b.update(); b.draw();
            if(b.y < -50) bullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.draw();
            bullets.forEach((b, bi) => {
                if(Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
                    e.hp--; bullets.splice(bi, 1);
                    shakeTime = 3; // 타격 진동
                    if(e.hp <= 0) {
                        score += e.isBoss ? 10000 : 100;
                        if(e.isBoss) {
                            isBossActive = false;
                            document.getElementById('boss-hp-ui').style.display = 'none';
                        }
                        enemies.splice(i, 1);
                        document.getElementById('score').innerText = score.toLocaleString();
                    }
                }
            });
        });

        // 4. 보스 등장 시퀀스
        if(score >= 3000 && !isBossActive) {
            isBossActive = true;
            document.getElementById('boss-warning').style.display = 'block';
            setTimeout(() => {
                document.getElementById('boss-warning').style.display = 'none';
                document.getElementById('boss-hp-ui').style.display = 'block';
                enemies.push(new Enemy(true));
            }, 2000);
        }

        if(frame % 50 === 0 && !isBossActive) enemies.push(new Enemy());

        if (shakeTime > 0) ctx.restore();
        requestAnimationFrame(render);
    }

    resize();
    bgImg.onload = () => { render(); };
    window.addEventListener('resize', resize);
</script>
</body>
</html>
