<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v18.0 - COSMIC</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #010105; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 통합 UI 레이어 */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        .interactive { pointer-events: auto; }

        /* 1. 로그인/시작 화면 */
        #login-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .input-box { background: rgba(255,255,255,0.1); border: 2px solid var(--mint); border-radius: 30px; padding: 15px 25px; color: white; text-align: center; margin-bottom: 20px; font-size: 1.1rem; }
        .btn { padding: 15px 50px; background: var(--mint); border: none; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--mint); }

        /* 2. 인게임 HUD */
        .hud { padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; }
        .hud-box { background: rgba(0,255,204,0.1); border-left: 4px solid var(--mint); padding: 10px 15px; backdrop-filter: blur(5px); }
        
        /* 3. 상점/랭킹 (사이드) */
        #side-menu { position: absolute; right: 20px; top: 150px; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 1px solid var(--pink); border-radius: 10px; color: var(--pink); font-size: 0.7rem; }

        #boss-ui { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; display: none; }
        .hp-container { height: 12px; background: rgba(0,0,0,0.8); border: 1px solid var(--pink); border-radius: 6px; overflow: hidden; }
        #hp-bar { height: 100%; background: var(--pink); width: 100%; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="login-screen" class="interactive">
        <h1 style="color:var(--mint); text-shadow:0 0 20px var(--mint); margin-bottom:40px;">COSMIC FRONTIER</h1>
        <input type="text" id="player-id" class="input-box" placeholder="ENTER PILOT ID" value="USER_01">
        <button class="btn" onclick="startGame()">START MISSION</button>
        <p style="color:var(--gold); font-size:0.8rem; margin-top:20px;">[SHOP] [RANKING] COMING SOON</p>
    </div>

    <div class="hud">
        <div class="hud-box">SCORE: <span id="score">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp">100</span></div>
    </div>

    <div id="boss-ui">
        <div style="color:var(--pink); font-size:0.7rem; text-align:center; margin-bottom:5px;">STATION GUARDIAN APPROACHING</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const assets = { bg: new Image(), player: new Image() };
    assets.bg.src = 'assets/bg_night.png'; // 향후 우주 배경으로 교체 권장
    assets.player.src = 'assets/player.png';

    let width, height, player, bullets = [], enemies = [], stars = [], explosions = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bgScale = 1;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = { x: width/2, y: height - 150, tx: width/2, ty: height - 150 };
        stars = Array(100).fill().map(() => ({ x: Math.random()*width-width/2, y: Math.random()*height-height/2, z: Math.random()*width }));
    }

    function startGame() {
        document.getElementById('login-screen').style.display = 'none';
        isPlaying = true;
    }

    const move = (x, y) => {
        if(!isPlaying) return;
        player.tx = Math.max(50, Math.min(width-50, x));
        player.ty = Math.max(150, Math.min(height-100, y-80));
    };
    window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y;
            // 공격이 가운데(소실점)로 빨려 들어가는 방향 계산
            this.vx = (width/2 - x) * 0.08;
            this.vy = (height/2 - y) * 0.08;
            this.scale = 1;
        }
        draw() {
            this.x += this.vx; this.y += this.vy;
            this.scale -= 0.02; // 멀어질수록 작아짐
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
            ctx.beginPath(); ctx.arc(this.x, this.y, 4 * this.scale, 0, Math.PI*2); ctx.fill();
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.angle = Math.random() * Math.PI * 2;
            this.dist = 0; this.scale = 0.05;
            this.hp = isBoss ? 350 : 1; // 보스 체력 하향
            this.maxHp = this.hp;
            this.spawnFlare = 30; // 출현 시 광원 효과 프레임
        }
        update() {
            this.scale *= 1.04; this.dist += (this.scale * 15);
            this.cx = width/2 + Math.cos(this.angle) * this.dist;
            this.cy = height/2 + Math.sin(this.angle) * this.dist;
            if(this.isBoss) {
                this.cx = width/2 + Math.sin(frame*0.04)*(width*0.3);
                this.cy = Math.min(height/2 - 100 + Math.cos(frame*0.03)*120, height*0.3);
                document.getElementById('boss-ui').style.display = 'block';
                document.getElementById('hp-bar').style.width = (this.hp/this.maxHp)*100+'%';
            }
        }
        draw() {
            if(this.spawnFlare > 0) {
                ctx.fillStyle = `rgba(255,255,255,${this.spawnFlare/30})`;
                ctx.beginPath(); ctx.arc(width/2, height/2, 50, 0, Math.PI*2); ctx.fill();
                this.spawnFlare--;
            }
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ffff';
            ctx.lineWidth = 3; ctx.strokeRect(-25, -25, 50, 50);
            ctx.restore();
        }
    }

    function render() {
        frame++;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);

        // 3D 우주 질주 배경
        bgScale += 0.005; if(bgScale > 3) bgScale = 1;
        ctx.save(); ctx.translate(width/2, height/2); ctx.scale(bgScale, bgScale);
        ctx.globalAlpha = 0.3;
        if(assets.bg.complete) ctx.drawImage(assets.bg, -width/2, -height/2, width, height);
        ctx.restore(); ctx.globalAlpha = 1;

        // 워프 스타 파티클
        stars.forEach(s => {
            s.z -= 20; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + width/2;
            let y = (s.y / s.z) * height + height/2;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`;
            ctx.fillRect(x, y, (1 - s.z/width)*5, (1 - s.z/width)*5);
        });

        if(isPlaying) {
            // [중요] 총알 그리기 (플레이어 뒤에 위치시키기 위해 플레이어 그리기 전에 실행)
            if(frame % 8 === 0) bullets.push(new Bullet(player.x-30, player.y), new Bullet(player.x+30, player.y));
            bullets.forEach((b, i) => {
                b.draw();
                if(b.scale <= 0.1) bullets.splice(i, 1);
            });

            // 플레이어
            player.x += (player.tx - player.x) * 0.15;
            player.y += (player.ty - player.y) * 0.15;
            if(assets.player.complete) ctx.drawImage(assets.player, player.x-50, player.y-50, 100, 100);

            // 적 & 보스
            if(frame % 50 === 0 && !boss) enemies.push(new Enemy());
            if(score >= 3000 && !boss) boss = new Enemy(true), enemies.push(boss);

            enemies.forEach((e, ei) => {
                e.update(); e.draw();
                // 원근 충돌
                if(e.scale > 0.8 && Math.hypot(e.cx - player.x, e.cy - player.y) < 60) {
                    hp -= 10; document.getElementById('hp').innerText = Math.max(0, hp);
                    enemies.splice(ei, 1);
                    if(hp <= 0) location.reload();
                }
                // 총알 충돌 (소실점 사격)
                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.cx - b.x, e.cy - b.y) < (e.scale * 60)) {
                        e.hp--; bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            score += e.isBoss ? 5000 : 100;
                            if(e.isBoss) { boss=null; document.getElementById('boss-ui').style.display='none'; }
                            enemies.splice(ei, 1);
                            document.getElementById('score').innerText = score;
                        }
                    }
                });
                if(e.scale > 6) enemies.splice(ei, 1);
            });
        }
        requestAnimationFrame(render);
    }

    init(); render();
</script>
</body>
</html>
