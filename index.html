<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v19.0 - NEBULA PRIME</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #020205; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 통합 시스템 레이어 */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        .interactive { pointer-events: auto; }

        /* 런처 (로그인, 상점, 랭킹 통합) */
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .tab-content { display: none; flex-direction: column; align-items: center; }
        .tab-content.active { display: flex; }
        
        .nav-bar { display: flex; gap: 20px; margin-bottom: 30px; }
        .nav-btn { background: none; border: 1px solid var(--mint); color: var(--mint); padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .input-box { background: rgba(255,255,255,0.1); border: 2px solid var(--mint); border-radius: 30px; padding: 15px 25px; color: white; text-align: center; margin-bottom: 20px; font-size: 1.1rem; }
        .main-btn { padding: 15px 60px; background: var(--mint); border: none; border-radius: 40px; color: #000; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 20px var(--mint); }

        /* 인게임 HUD */
        .hud { padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; }
        .hud-box { background: rgba(0,255,204,0.15); border: 1px solid var(--mint); padding: 10px 20px; border-radius: 10px; backdrop-filter: blur(5px); }
        
        #boss-ui { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 85%; display: none; text-align: center; }
        .hp-container { height: 14px; background: rgba(0,0,0,0.8); border: 1px solid var(--pink); border-radius: 20px; overflow: hidden; margin-top: 10px; }
        #hp-bar { height: 100%; background: var(--pink); width: 100%; transition: width 0.1s; }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <div class="nav-bar">
            <button class="nav-btn" onclick="switchTab('login')">PILOT</button>
            <button class="nav-btn" onclick="switchTab('shop')">SHOP</button>
            <button class="nav-btn" onclick="switchTab('rank')">RANK</button>
        </div>

        <div id="login-tab" class="tab-content active">
            <h1 style="color:var(--mint); font-style:italic; text-shadow:0 0 20px var(--mint);">NEBULA PRIME</h1>
            <input type="text" id="player-id" class="input-box" placeholder="CALLSIGN" value="PILOT_01">
            <button class="main-btn" onclick="startGame()">MISSION START</button>
        </div>

        <div id="shop-tab" class="tab-content">
            <h2 style="color:var(--pink);">TECH UPGRADE</h2>
            <p>CREDITS: <span style="color:var(--gold);">1,250</span></p>
            <div style="border:1px dashed var(--pink); padding:20px;">[SKIN: NEON WING] - 500c</div>
        </div>

        <div id="rank-tab" class="tab-content">
            <h2 style="color:var(--gold);">TOP PILOTS</h2>
            <div style="text-align:left;">1. PILOT_ACE - 99,200<br>2. PILOT_01 - 45,100<br>3. NOOB_X - 1,200</div>
        </div>
    </div>

    <div class="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>

    <div id="boss-ui">
        <div style="color:var(--pink); font-size:0.8rem; letter-spacing:4px;">STATION GUARDIAN ACTIVE</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    
    let width, height, player, bullets = [], enemies = [], stars = [], explosions = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bgScale = 1;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = init;
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = { x: width/2, y: height - 150, tx: width/2, ty: height - 150 };
        stars = Array(120).fill().map(() => ({ x: Math.random()*width-width/2, y: Math.random()*height-height/2, z: Math.random()*width }));
        render();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
    }

    function startGame() {
        document.getElementById('launcher').style.display = 'none';
        isPlaying = true;
    }

    const move = (x, y) => {
        if(!isPlaying) return;
        player.tx = Math.max(50, Math.min(width-50, x));
        player.ty = Math.max(150, Math.min(height-100, y-80));
    };
    window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y;
            // 공격이 소실점(가운데)으로 수렴
            this.vx = (width/2 - x) * 0.07;
            this.vy = (height/2 - y) * 0.07;
            this.scale = 1;
        }
        draw() {
            this.x += this.vx; this.y += this.vy;
            this.scale -= 0.02;
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
            ctx.beginPath(); ctx.arc(this.x, this.y, 5 * this.scale, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.angle = Math.random() * Math.PI * 2;
            this.dist = 0; this.scale = 0.02;
            this.hp = isBoss ? 300 : 1;
            this.maxHp = this.hp;
            this.flare = 40; // 포털 연출 프레임
        }
        update() {
            this.scale *= (this.isBoss ? 1.015 : 1.045); 
            this.dist += (this.scale * 16);
            this.cx = width/2 + Math.cos(this.angle) * this.dist;
            this.cy = height/2 + Math.sin(this.angle) * this.dist;
            if(this.isBoss) {
                this.cx = width/2 + Math.sin(frame*0.03) * (width*0.3);
                this.cy = Math.min(height/2 - 100 + Math.cos(frame*0.02)*100, height*0.3);
                document.getElementById('boss-ui').style.display = 'block';
                document.getElementById('hp-bar').style.width = (this.hp/this.maxHp)*100+'%';
            }
        }
        draw() {
            if(this.flare > 0) {
                ctx.strokeStyle = `rgba(255,255,255,${this.flare/40})`;
                ctx.beginPath(); ctx.arc(width/2, height/2, 60 - this.flare, 0, Math.PI*2); ctx.stroke();
                this.flare--;
            }
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ccff';
            ctx.lineWidth = 3; ctx.strokeRect(-30, -30, 60, 60);
            ctx.restore();
        }
    }

    function render() {
        frame++;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);

        // [배경] 3D 로드 그리드 및 성운 확대
        bgScale += 0.004; if(bgScale > 3) bgScale = 1;
        ctx.save(); ctx.translate(width/2, height/2); ctx.scale(bgScale, bgScale);
        ctx.globalAlpha = 0.3;
        if(assets.bg.complete) ctx.drawImage(assets.bg, -width/2, -height/2, width, height);
        ctx.restore(); ctx.globalAlpha = 1;

        // 워프 스타 파티클
        stars.forEach(s => {
            s.z -= 18; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + width/2;
            let y = (s.y / s.z) * height + height/2;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`;
            ctx.fillRect(x, y, 2, 2);
        });

        if(isPlaying) {
            // 사격 레이어 (기체 뒤에서 소실점으로)
            if(frame % 7 === 0) bullets.push(new Bullet(player.x-35, player.y), new Bullet(player.x+35, player.y));
            bullets.forEach((b, i) => {
                b.draw();
                if(b.scale <= 0.05) bullets.splice(i, 1);
            });

            // 플레이어 (Smoothness 보정)
            player.x += (player.tx - player.x) * 0.18;
            player.y += (player.ty - player.y) * 0.18;
            if(assets.player.complete) {
                ctx.shadowBlur = 20; ctx.shadowColor = '#00ffcc';
                ctx.drawImage(assets.player, player.x-55, player.y-55, 110, 110);
                ctx.shadowBlur = 0;
            }

            // 적 스폰 및 처리
            if(frame % 45 === 0 && !boss) enemies.push(new Enemy());
            if(score >= 4000 && !boss) boss = new Enemy(true), enemies.push(boss);

            enemies.forEach((e, ei) => {
                e.update(); e.draw();
                // 3D 충돌 판정
                if(e.scale > 0.8 && Math.hypot(e.cx - player.x, e.cy - player.y) < 65) {
                    hp -= 15; document.getElementById('hp-val').innerText = Math.max(0, hp);
                    enemies.splice(ei, 1);
                    if(hp <= 0) location.reload();
                }
                // 소실점 타격 판정
                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.cx - b.x, e.cy - b.y) < (e.scale * 70)) {
                        e.hp--; bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            score += e.isBoss ? 10000 : 100;
                            if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; }
                            enemies.splice(ei, 1);
                            document.getElementById('score-val').innerText = score;
                        }
                    }
                });
                if(e.scale > 7) enemies.splice(ei, 1);
            });
        }
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
