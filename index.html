<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v23.0 - SINGULARITY</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #010103; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: var(--bg); touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        .interactive { pointer-events: auto; }

        /* 런처 시스템 */
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .nav-btn { background: none; border: 1.5px solid var(--mint); color: var(--mint); padding: 8px 15px; border-radius: 8px; cursor: pointer; margin: 0 5px 20px; }
        .nav-btn.active { background: var(--mint); color: #000; }
        .main-btn { padding: 18px 60px; background: var(--mint); border: none; border-radius: 50px; color: #000; font-weight: bold; font-size: 1.3rem; cursor: pointer; box-shadow: 0 0 25px var(--mint); }

        /* HUD */
        #hud { position: absolute; top: 0; width: 100%; padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; }
        .hud-box { background: rgba(0,0,0,0.7); border: 2px solid var(--mint); padding: 10px 20px; border-radius: 15px; box-shadow: 0 0 15px var(--mint); }
        
        #boss-ui { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 85%; display: none; }
        .hp-container { height: 16px; background: rgba(0,0,0,0.8); border: 2px solid var(--pink); border-radius: 20px; overflow: hidden; box-shadow: 0 0 15px var(--pink); }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--pink), #fff); width: 100%; transition: width 0.1s; }
    </style>
</head>
<body onload="initAssets()">

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="launcher" class="interactive">
        <h1 style="color:var(--mint); font-style:italic; font-size:2.5rem; text-shadow:0 0 20px var(--mint); margin-bottom:40px;">COSMIC SINGULARITY</h1>
        <button class="main-btn" onclick="startGame()">MISSION START</button>
    </div>

    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>

    <div id="boss-ui">
        <div style="color:var(--pink); font-size:0.7rem; text-align:center; margin-bottom:5px; letter-spacing:4px;">NEURAL BOSS DETECTED</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    
    let width, height, centerX, centerY, player, bullets = [], enemies = [], stars = [], particles = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, boss = null, bossTrigger = 4000, shake = 0;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = init;
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2;
        centerY = height / 2;
        player = { x: centerX, y: height - 150, tx: centerX, ty: height - 150, scale: 1.2 };
        stars = Array(150).fill().map(() => ({ x: Math.random()*width-centerX, y: Math.random()*height-centerY, z: Math.random()*width }));
    }

    function startGame() {
        document.getElementById('launcher').style.display = 'none';
        document.getElementById('hud').style.visibility = 'visible';
        isPlaying = true;
        render();
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return;
        e.preventDefault();
        player.tx = Math.max(50, Math.min(width-50, e.touches[0].clientX));
        player.ty = Math.max(150, Math.min(height-100, e.touches[0].clientY - 80));
    }, { passive: false });

    class Bullet {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.scale = 1.0;
            this.vx = (centerX - x) * 0.08;
            this.vy = (centerY - y) * 0.08;
        }
        draw() {
            this.x += this.vx; this.y += this.vy;
            this.scale *= 0.95;
            ctx.fillStyle = `rgba(0, 255, 204, ${this.scale + 0.3})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 8 * this.scale, 0, Math.PI*2); ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random()-0.5)*10;
            this.vy = (Math.random()-0.5)*10;
            this.life = 1.0;
        }
        draw() {
            this.x += this.vx; this.y += this.vy;
            this.life -= 0.03;
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.angle = Math.random() * Math.PI * 2;
            this.dist = 0; this.scale = 0.01;
            this.hp = isBoss ? 400 : 1;
            this.maxHp = this.hp;
            this.dash = false;
        }
        update() {
            this.scale *= (this.isBoss ? 1.01 : 1.05);
            if(this.isBoss && this.scale > 0.85) {
                this.scale = 0.85;
                this.angle += 0.03;
                this.dist = 250 + Math.sin(frame*0.05)*50; // 동적 공전
            } else {
                this.dist += (this.scale * 22);
            }
            this.cx = centerX + Math.cos(this.angle) * this.dist;
            this.cy = centerY + Math.sin(this.angle) * this.dist;
            if(this.isBoss) {
                document.getElementById('boss-ui').style.display = 'block';
                document.getElementById('hp-bar').style.width = (this.hp/this.maxHp)*100+'%';
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.cx, this.cy); ctx.scale(this.scale, this.scale);
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#00ffff';
            ctx.lineWidth = 4; ctx.strokeRect(-40, -40, 80, 80);
            ctx.restore();
        }
    }

    function render() {
        if(!isPlaying) return;
        frame++;
        if(shake > 0) { ctx.setTransform(1,0,0,1,Math.random()*10-5, Math.random()*10-5); shake--; }
        else ctx.setTransform(1,0,0,1,0,0);

        ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);

        // 배경 3D 워프
        stars.forEach(s => {
            s.z -= 25; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + centerX;
            let y = (s.y / s.z) * height + centerY;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`;
            ctx.fillRect(x, y, 2, 2);
        });

        // 웜홀 광원 (소실점 연출)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.beginPath(); ctx.arc(centerX, centerY, 50, 0, Math.PI*2); ctx.fill();

        // 총알 (기체 뒤 레이어)
        if(frame % 7 === 0) bullets.push(new Bullet(player.x-35, player.y), new Bullet(player.x+35, player.y));
        bullets.forEach((b, i) => {
            b.draw();
            if(b.scale < 0.1) bullets.splice(i, 1);
        });

        // 플레이어
        player.x += (player.tx - player.x) * 0.2;
        player.y += (player.ty - player.y) * 0.2;
        ctx.shadowBlur = 30; ctx.shadowColor = '#00ffcc';
        ctx.drawImage(assets.player, player.x-55, player.y-55, 110, 110);
        ctx.shadowBlur = 0;

        // 적 & 파티클 로직
        if(frame % 40 === 0 && !boss) enemies.push(new Enemy());
        if(score >= bossTrigger && !boss) boss = new Enemy(true), enemies.push(boss);

        enemies.forEach((e, ei) => {
            e.update(); e.draw();
            // 충돌 판정
            if(e.scale > 0.8 && Math.hypot(e.cx - player.x, e.cy - player.y) < 70) {
                hp -= 15; shake = 20;
                document.getElementById('hp-val').innerText = hp;
                if(hp <= 0) location.reload();
                enemies.splice(ei, 1);
            }
            // 타격 판정
            bullets.forEach((b, bi) => {
                if(Math.hypot(e.cx - b.x, e.cy - b.y) < (e.scale * 100)) {
                    e.hp--; bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        score += e.isBoss ? 15000 : 100;
                        for(let k=0; k<8; k++) particles.push(new Particle(e.cx, e.cy, e.isBoss?'#ff00ff':'#00ffff'));
                        if(e.isBoss) { boss = null; document.getElementById('boss-ui').style.display='none'; bossTrigger += 15000; }
                        enemies.splice(ei, 1);
                        document.getElementById('score-val').innerText = score;
                    }
                }
            });
            if(e.scale > 8) enemies.splice(ei, 1);
        });

        particles.forEach((p, pi) => { p.draw(); if(p.life <= 0) particles.splice(pi, 1); });

        requestAnimationFrame(render);
    }
</script>
</body>
</html>
