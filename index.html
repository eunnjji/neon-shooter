<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER - MASTER</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 레이어 */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; font-family: 'Segoe UI', sans-serif; }
        .hud { padding: env(safe-area-inset-top) 20px 0; display: flex; justify-content: space-between; color: var(--mint); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px var(--mint); }
        
        /* 보스 UI */
        #boss-ui { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 80%; display: none; text-align: center; }
        .boss-warning { color: var(--pink); font-size: 1.5rem; font-weight: 900; animation: blink 0.5s infinite; margin-bottom: 8px; }
        .hp-container { height: 12px; background: rgba(0,0,0,0.6); border: 2px solid var(--pink); border-radius: 6px; overflow: hidden; box-shadow: 0 0 15px var(--pink); }
        #hp-bar { height: 100%; background: var(--pink); width: 100%; transition: width 0.1s; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span></div>
    </div>
    <div id="boss-ui">
        <div class="boss-warning">WARNING: BOSS DETECTED</div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // [이미지 에셋 설정]
    const assets = {
        bg: new Image(),
        player: new Image()
    };
    assets.bg.src = 'assets/bg_night.png';
    assets.player.src = 'assets/player.png'; // 손가락 지운 PNG

    let width, height, player, bullets = [], enemies = [], frame = 0, bgOffset = 0;
    let score = 0, hp = 100, boss = null, imagesLoaded = 0;

    // [이미지 로딩 검증]
    function checkAssets() {
        imagesLoaded++;
        if (imagesLoaded >= 2) startLoop();
    }
    assets.bg.onload = checkAssets;
    assets.player.onload = checkAssets;
    assets.bg.onerror = () => { console.warn("Background image missing"); checkAssets(); };
    assets.player.onerror = () => { console.warn("Player image missing"); checkAssets(); };

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = { x: width / 2, y: height - 150, targetX: width / 2, targetY: height - 150 };
    }

    // [UX 최적화: 터치 오프셋 적용]
    const handleInput = (x, y) => {
        player.targetX = x;
        player.targetY = y - 80; // 손가락에 가리지 않도록 80px 위로 설정
    };
    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));

    class Bullet {
        constructor(x, y) { this.x = x; this.y = y; this.v = 18; }
        draw() {
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
            ctx.fillRect(this.x - 2, this.y, 4, 20);
            this.y -= this.v;
            ctx.shadowBlur = 0;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.x = isBoss ? width / 2 : Math.random() * (width - 60) + 30;
            this.y = -100;
            this.hp = isBoss ? 60 : 1;
            this.size = isBoss ? 100 : 30;
            this.v = isBoss ? 0.6 : 4;
        }
        draw() {
            ctx.strokeStyle = this.isBoss ? '#ff00ff' : '#ff4444';
            ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = ctx.strokeStyle;
            ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            this.y += this.v;
            if (this.isBoss) {
                this.x += Math.sin(frame * 0.04) * 4;
                document.getElementById('boss-ui').style.display = 'block';
                document.getElementById('hp-bar').style.width = (this.hp / 60) * 100 + '%';
            }
            ctx.shadowBlur = 0;
        }
    }

    function startLoop() {
        init();
        render();
    }

    function render() {
        frame++;
        ctx.clearRect(0, 0, width, height);

        // [1. 배경 렌더링 (루핑)]
        bgOffset += 3;
        if (bgOffset > height) bgOffset = 0;
        if (assets.bg.complete && assets.bg.naturalWidth !== 0) {
            ctx.drawImage(assets.bg, 0, bgOffset - height, width, height);
            ctx.drawImage(assets.bg, 0, bgOffset, width, height);
        } else {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, width, height);
        }

        // [2. 플레이어 렌더링 (보간 적용)]
        player.x += (player.targetX - player.x) * 0.15;
        player.y += (player.targetY - player.y) * 0.15;
        
        ctx.shadowBlur = 25; ctx.shadowColor = '#00ffcc';
        if (assets.player.complete && assets.player.naturalWidth !== 0) {
            ctx.drawImage(assets.player, player.x - 40, player.y - 40, 80, 80);
        } else {
            // 이미지 없을 시 대체 삼각형
            ctx.strokeStyle = '#00ffcc'; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 30); ctx.lineTo(player.x-20, player.y+10); ctx.lineTo(player.x+20, player.y+10);
            ctx.closePath(); ctx.stroke();
        }
        ctx.shadowBlur = 0;

        // [3. 로직 업데이트]
        if (frame % 8 === 0) bullets.push(new Bullet(player.x, player.y - 40));
        if (frame % 60 === 0 && !boss) enemies.push(new Enemy());
        if (score >= 2000 && !boss) { boss = new Enemy(true); enemies.push(boss); }

        bullets.forEach((b, bi) => {
            b.draw();
            if (b.y < -30) bullets.splice(bi, 1);
        });

        enemies.forEach((e, ei) => {
            e.draw();
            bullets.forEach((b, bi) => {
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.size/2 + 10) {
                    e.hp--; bullets.splice(bi, 1);
                    if (e.hp <= 0) {
                        score += e.isBoss ? 5000 : 100;
                        if (e.isBoss) { boss = null; document.getElementById('boss-ui').style.display = 'none'; }
                        enemies.splice(ei, 1);
                        document.getElementById('score').innerText = score.toLocaleString();
                    }
                }
            });
            if (e.y > height + 100) enemies.splice(ei, 1);
        });

        requestAnimationFrame(render);
    }

    window.onresize = init;
</script>
</body>
</html>
