<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v10.0 - APEX</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --cyan: #00ffff; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            overflow: hidden; background: #000; touch-action: none;
            overscroll-behavior: none; font-family: 'Arial Black', sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .hud { padding: env(safe-area-inset-top) 25px 0; display: flex; justify-content: space-between; }
        .hud div { color: var(--mint); font-size: 1.4rem; text-shadow: 0 0 15px var(--mint); }
        #msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--cyan); text-align: center; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body onclick="gameStart()">

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="msg">TOUCH TO DEPLOY PILOT</div>
    <div class="hud">
        <div id="score-text">SCORE: 0</div>
        <div id="hp-text" style="color: #ff3333;">HP: 100</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const assets = { bg: new Image(), player: new Image() };
    assets.bg.src = 'assets/bg_night.png';
    assets.player.src = 'assets/player.png';

    let width, height, player, bullets = [], enemies = [], stars = [], frame = 0;
    let score = 0, hp = 100, isPlaying = false, shake = 0, bgScale = 1;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        player = { x: width/2, y: height + 100, tx: width/2, ty: height-150, scale: 2 };
        stars = Array(120).fill().map(() => ({
            x: Math.random() * width - width/2,
            y: Math.random() * height - height/2,
            z: Math.random() * width
        }));
    }

    function gameStart() {
        if(isPlaying) return;
        isPlaying = true;
        document.getElementById('msg').style.display = 'none';
    }

    const move = (x, y) => {
        if(!isPlaying) return;
        player.tx = Math.max(50, Math.min(width-50, x));
        player.ty = Math.max(100, Math.min(height-100, y-80));
    };
    window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));

    class Bullet {
        constructor(tx, ty) {
            this.x = width/2; // 소실점에서 발사
            this.y = height/2;
            this.tx = tx; // 목표 지점 (플레이어의 현재 위치 방향)
            this.ty = ty;
            this.scale = 0.1;
            this.vx = (tx - width/2) * 0.05;
            this.vy = (ty - height/2) * 0.05;
        }
        draw() {
            this.scale += 0.05;
            this.x += this.vx; this.y += this.vy;
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2 * this.scale, 0, Math.PI*2);
            ctx.fill();
        }
    }

    class Enemy {
        constructor() {
            this.angle = Math.random() * Math.PI * 2;
            this.dist = 0;
            this.scale = 0.05;
            this.hp = 1;
            this.size = 50;
        }
        update() {
            this.scale *= 1.035;
            this.dist += (this.scale * 12);
            this.curX = width/2 + Math.cos(this.angle) * this.dist;
            this.curY = height/2 + Math.sin(this.angle) * this.dist;
        }
        draw() {
            ctx.save();
            ctx.translate(this.curX, this.curY);
            ctx.scale(this.scale, this.scale);
            ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = '#ff3333';
            ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }

    function render() {
        frame++;
        if (shake > 0) { ctx.setTransform(1,0,0,1,Math.random()*12-6, Math.random()*12-6); shake--; }
        else { ctx.setTransform(1,0,0,1,0,0); }

        ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);

        // 배경 3D 줌 로직
        bgScale += 0.002; if(bgScale > 2.5) bgScale = 1;
        ctx.save();
        ctx.translate(width/2, height/2); ctx.scale(bgScale, bgScale);
        ctx.globalAlpha = 0.3;
        if(assets.bg.complete) ctx.drawImage(assets.bg, -width/2, -height/2, width, height);
        ctx.restore(); ctx.globalAlpha = 1;

        // 워프 스타 파티클
        stars.forEach(s => {
            s.z -= 18; if(s.z <= 0) s.z = width;
            let x = (s.x / s.z) * width + width/2;
            let y = (s.y / s.z) * height + height/2;
            let sz = (1 - s.z/width) * 7;
            ctx.fillStyle = `rgba(0, 255, 204, ${1 - s.z/width})`;
            ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI*2); ctx.fill();
        });

        // 플레이어 (Lerp & Scale 애니메이션)
        if(isPlaying) {
            player.x += (player.tx - player.x) * 0.15;
            player.y += (player.ty - player.y) * 0.15;
            player.scale += (1 - player.scale) * 0.1;
        }

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.scale(player.scale, player.scale);
        ctx.shadowBlur = 30; ctx.shadowColor = '#00ffcc';
        if(assets.player.complete) ctx.drawImage(assets.player, -55, -55, 110, 110);
        ctx.restore();

        // 인게임 로직
        if(isPlaying) {
            // 공격도 방사형으로! (유저 기체 방향으로 뻗어 나감)
            if(frame % 6 === 0) {
                bullets.push(new Bullet(player.x, player.y));
                bullets.push(new Bullet(player.x - 40, player.y));
                bullets.push(new Bullet(player.x + 40, player.y));
            }
            if(frame % 35 === 0) enemies.push(new Enemy());

            bullets.forEach((b, bi) => {
                b.draw();
                if(b.y > height || b.x < 0 || b.x > width) bullets.splice(bi, 1);
            });

            enemies.forEach((e, ei) => {
                e.update(); e.draw();
                // 원근 충돌 판정
                if(e.scale > 0.8 && Math.hypot(e.curX-player.x, e.curY-player.y) < (e.size*e.scale)/1.5 + 20) {
                    hp -= 10; shake = 15; enemies.splice(ei, 1);
                    document.getElementById('hp-text').innerText = "HP: " + Math.max(0, hp);
                    if(hp <= 0) location.reload();
                }
                // 총알과 적 충돌
                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.curX-b.x, e.curY-b.y) < (e.size*e.scale)) {
                        score += 100; enemies.splice(ei, 1); bullets.splice(bi, 1);
                        document.getElementById('score-text').innerText = "SCORE: " + score.toLocaleString();
                    }
                });
                if(e.scale > 6) enemies.splice(ei, 1);
            });
        }
        requestAnimationFrame(render);
    }

    init(); render();
    window.onresize = init;
</script>
</body>
</html>
