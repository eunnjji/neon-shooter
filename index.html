<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER</title>
    <style>
        :root { --neon-mint: #00ffcc; --neon-pink: #ff00ff; --overlay: rgba(0, 0, 0, 0.7); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background-color: #000; font-family: sans-serif; background-size: cover; background-position: center; }
        #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); backdrop-filter: blur(5px); z-index: 1; }
        #game-ui { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; color: white; padding: env(safe-area-inset-top) 20px 40px; }
        h1 { color: var(--neon-mint); text-shadow: 0 0 15px var(--neon-mint); font-size: 2.5rem; margin-top: 20px; font-style: italic; }
        .panel { background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--neon-pink); border-radius: 15px; padding: 20px; width: 100%; box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        .progress-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--neon-mint); width: 0%; transition: width 1s ease; box-shadow: 0 0 10px var(--neon-mint); }
        .btn { padding: 16px 40px; background: transparent; border: 2px solid var(--neon-mint); color: var(--neon-mint); font-weight: bold; border-radius: 30px; box-shadow: 0 0 10px var(--neon-mint); cursor: pointer; }
        .particle { position: absolute; width: 6px; height: 6px; background: var(--neon-mint); border-radius: 50%; pointer-events: none; animation: explode 0.6s ease-out forwards; }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
    </style>
</head>
<body onclick="spawn_particles(event)">
    <div id="ui-overlay"></div>
    <div id="game-ui">
        <h1>NEON SHOOTER</h1>
        <div class="panel">
            <h3 style="margin:0; color:var(--neon-pink);">🏆 RANKING</h3>
            <div id="rank-list" style="margin-top:10px; font-size:0.9rem;">데이터를 불러오는 중...</div>
        </div>
        <div class="panel">
            <h3 id="m-name" style="margin:0;">🎯 MISSION</h3>
            <div id="m-status" style="margin-top:10px;">연결 중...</div>
            <div class="progress-bar"><div id="m-fill" class="progress-fill"></div></div>
        </div>
        <button class="btn" onclick="fetchData()">DATA REFRESH</button>
    </div>

    <script>
        const API_URL = "https://te3hlwv09c.execute-api.ap-northeast-2.amazonaws.com/default/"; // 보안 유지!

        async function fetchData() {
    try {
        // 엔드포인트 호출
        const res = await fetch(API_URL); 
        const data = await res.json();
        
        // 1. 랭킹 업데이트 (nickname과 score 매핑)
        const rankList = document.getElementById('rank-list');
        rankList.innerHTML = data.rankers.length > 0 
            ? data.rankers.map((r, i) => `${i+1}. ${r.nickname || 'Unknown'} - ${r.score.toLocaleString()}`).join('<br>')
            : "랭커 데이터가 없습니다.";
        
        // 2. 미션 업데이트 (name, prog, target 매핑)
        if (data.mission) {
            document.getElementById('m-name').innerText = `🎯 ${data.mission.name}`;
            document.getElementById('m-status').innerText = `진행도: ${data.mission.prog} / ${data.mission.target}`;
            
            // 프로그레스 바 계산
            const percent = (data.mission.prog / data.mission.target) * 100;
            document.getElementById('m-fill').style.width = `${percent}%`;
        }
    } catch (e) {
        console.error("데이터 동기화 실패:", e);
        document.getElementById('m-status').innerText = "서버 연결 오류";
    }
    }

        function spawn_particles(e) {
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.setProperty('--tx', (Math.random()-0.5)*200+'px');
                p.style.setProperty('--ty', (Math.random()-0.5)*200+'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function apply_theme() {
            const hour = new Date().getHours();
            document.body.style.backgroundImage = (hour >= 2 && hour <= 6) ? "url('assets/bg_dawn.png')" : "url('assets/bg_night.png')";
        }

        apply_theme();
        fetchData();
    </script>
</body>
</html>
