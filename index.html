<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v0.95</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; color: white; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 10; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .main-btn { padding: 18px 70px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 50px; font-weight: bold; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 15px var(--mint); }
        #rank-board { width: 300px; background: rgba(0, 255, 204, 0.1); border: 1px solid var(--mint); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #hud { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; z-index: 150; }
        .hud-box { background: rgba(0,0,0,0.7); border: 1px solid var(--mint); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body onload="initAssets()">
<canvas id="gameCanvas"></canvas>
<div id="ui-layer">
    <div id="launcher" class="interactive">
        <h2 style="color:var(--mint);">NEON_SHOOTER_v95</h2>
        <div id="rank-board"><div id="rank-list">DB_CONNECTING...</div></div>
        <input type="text" id="player-id" style="background:#222; border:1px solid var(--mint); color:white; padding:10px; border-radius:10px; width:180px; text-align:center; margin-bottom:20px;" value="MASTER_DBA">
        <button class="main-btn" onclick="startGame()">MISSION START</button>
    </div>
    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>
</div>

<script>
    // 스크린샷 기반 최종 Invoke URL
    const API_URL = "https://yjcl8duzsd.execute-api.ap-northeast-2.amazonaws.com/NeonShooter_Logic-API_2nd/items";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, player, bullets = [], enemies = [], frame = 0, score = 0, hp = 100, isPlaying = false;

    async function fetchRankings() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const items = Array.isArray(data) ? data : (data.Items || []);
            document.getElementById('rank-list').innerHTML = items.sort((a,b)=>b.ns_score-a.ns_score).slice(0, 5).map((item, i) => 
                `<div class="rank-item"><span>${i+1}. ${item.ns_pilot_id}</span><span>${item.ns_score}</span></div>`
            ).join('') || "NO DATA";
        } catch (e) { document.getElementById('rank-list').innerHTML = "DB_SYNC_WAITING"; }
    }

    function initAssets() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        fetchRankings();
    }

    function startGame() {
        document.getElementById('launcher').style.display = 'none';
        document.getElementById('hud').style.visibility = 'visible';
        player = { x: width/2, y: height-120, tx: width/2, ty: height-120 };
        isPlaying = true;
        render();
    }

    async function endGame() {
        isPlaying = false;
        try {
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" }, // API 설정 대문자와 일치
                body: JSON.stringify({ ns_pilot_id: document.getElementById('player-id').value, ns_score: Number(score) })
            });
        } catch(e) { console.error("SAVE_ERROR", e); }
        location.reload();
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return; e.preventDefault();
        player.tx = e.touches[0].clientX; player.ty = e.touches[0].clientY - 60;
    }, { passive: false });

    function render() {
        if(!isPlaying) return;
        frame++; ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);
        
        if(frame%8===0) bullets.push({x: player.x, y: player.y});
        bullets.forEach((b, i) => {
            b.y -= 10; ctx.fillStyle = '#fff'; ctx.fillRect(b.x-2, b.y, 4, 15);
            if(b.y < 0) bullets.splice(i, 1);
        });

        if(frame%50===0) enemies.push({x: Math.random()*width, y: -50});
        enemies.forEach((e, ei) => {
            e.y += 4; ctx.strokeStyle = '#00ffff'; ctx.strokeRect(e.x-20, e.y-20, 40, 40);
            if(Math.hypot(e.x-player.x, e.y-player.y) < 40) {
                hp -= 10; enemies.splice(ei, 1);
                document.getElementById('hp-val').innerText = hp;
                if(hp <= 0) endGame();
            }
            bullets.forEach((b, bi) => {
                if(Math.hypot(e.x-b.x, e.y-b.y) < 30) {
                    enemies.splice(ei, 1); bullets.splice(bi, 1);
                    score += 100; document.getElementById('score-val').innerText = score;
                }
            });
            if(e.y > height) enemies.splice(ei, 1);
        });

        player.x += (player.tx-player.x)*0.2; player.y += (player.ty-player.y)*0.2;
        ctx.fillStyle = '#00ffcc'; ctx.fillRect(player.x-25, player.y-25, 50, 50);
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
