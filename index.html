<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTER v0.65 - FINAL SYNC</title>
    <style>
        :root { --mint: #00ffcc; --pink: #ff00ff; --gold: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; color: white; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        #launcher { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(40px); transition: 0.8s; }
        .main-btn { padding: 18px 70px; background: transparent; border: 3px solid var(--mint); color: var(--mint); border-radius: 50px; font-weight: bold; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 25px var(--mint); transition: 0.3s; letter-spacing: 5px; margin-bottom: 25px; }
        #rank-board { width: 320px; background: rgba(0, 255, 204, 0.05); border: 2px solid rgba(0, 255, 204, 0.3); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-family: 'Courier New', monospace; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        #hud { position: absolute; top: 0; width: 100%; padding: env(safe-area-inset-top) 25px 0; display: flex; justify-content: space-between; visibility: hidden; box-sizing: border-box; }
        .hud-box { background: rgba(0, 0, 0, 0.8); border: 2px solid var(--mint); padding: 10px 20px; border-radius: 20px; }
        #exit-btn { background: rgba(255, 0, 255, 0.15); border: 2.5px solid var(--pink); color: var(--pink); padding: 10px 20px; border-radius: 20px; font-weight: bold; pointer-events: auto; cursor: pointer; }
        #damage-flash { position: absolute; inset: 0; background: rgba(255, 0, 0, 0.25); display: none; pointer-events: none; z-index: 50; }
    </style>
</head>
<body onload="initAssets()">
<canvas id="gameCanvas"></canvas>
<div id="damage-flash"></div>
<div id="ui-layer">
    <div id="launcher" class="interactive">
        <div style="color:var(--mint); font-size:1.2rem; margin-bottom:20px; letter-spacing:5px;">NS_RANKINGS_v65</div>
        <div id="rank-board"><div id="rank-list">SYNCING WITH AWS...</div></div>
        <input type="text" id="player-id" style="background:none; border:2px solid var(--mint); border-radius:20px; padding:15px; color:white; text-align:center; width:240px; margin-bottom:25px; font-size:1.1rem;" value="PILOT_01">
        <button class="main-btn" onclick="startGame()">MISSION START</button>
    </div>
    <div id="hud">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div id="exit-btn" onclick="endGame()">SAVE & EXIT</div>
        <div class="hud-box" style="border-color:var(--pink); color:var(--pink);">HP: <span id="hp-val">100</span></div>
    </div>
</div>
<script>
    const API_URL = "https://te3hlwv09c.execute-api.ap-northeast-2.amazonaws.com/default/";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = { bg: new Image(), player: new Image() };
    let width, height, player, bullets = [], enemies = [], stars = [], frame = 0, score = 0, hp = 100, isPlaying = false;

    function initAssets() {
        assets.bg.src = 'assets/bg_night.png';
        assets.player.src = 'assets/player.png';
        assets.player.onload = () => { init(); fetchRankings(); };
    }

    async function fetchRankings() {
        try {
            const response = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await response.json();
            const items = Array.isArray(data) ? data : (data.Items || []);
            document.getElementById('rank-list').innerHTML = items.slice(0, 5).map((item, i) => 
                `<div class="rank-item"><span>${i+1}. ${item.ns_pilot_id}</span><span>${Number(item.ns_score).toLocaleString()}</span></div>`
            ).join('');
        } catch (e) { document.getElementById('rank-list').innerHTML = "SYNC ERROR"; }
    }

    async function startGame() {
        document.getElementById('launcher').style.transform = 'translateY(-100%)';
        document.getElementById('hud').style.visibility = 'visible';
        isPlaying = true; render();
    }

    async function endGame() {
        if(!isPlaying) return;
        isPlaying = false;
        document.getElementById('exit-btn').innerText = "SAVING...";
        await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ns_pilot_id: document.getElementById('player-id').value, ns_score: score })
        });
        location.reload();
    }

    function init() {
        width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
        player = { x: width/2, y: height-180, tx: width/2, ty: height-180 };
        stars = Array(100).fill().map(() => ({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2 }));
    }

    window.addEventListener('touchmove', (e) => {
        if(!isPlaying) return; e.preventDefault();
        player.tx = e.touches[0].clientX; player.ty = e.touches[0].clientY - 50;
    }, { passive: false });

    function render() {
        if(!isPlaying) return;
        frame++; ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);
        stars.forEach(s => { s.y += 2; if(s.y > height) s.y = 0; ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s); });
        player.x += (player.tx - player.x) * 0.2; player.y += (player.ty - player.y) * 0.2;
        ctx.drawImage(assets.player, player.x-40, player.y-40, 80, 80);
        if(frame % 50 === 0) enemies.push({ x: Math.random()*width, y: -50 });
        enemies.forEach((e, i) => {
            e.y += 4; ctx.strokeStyle = '#00ffcc'; ctx.strokeRect(e.x-20, e.y-20, 40, 40);
            if(Math.hypot(e.x-player.x, e.y-player.y) < 50) { hp -= 10; enemies.splice(i,1); document.getElementById('hp-val').innerText = hp; if(hp<=0) endGame(); }
            if(e.y > height) enemies.splice(i,1);
        });
        score++; document.getElementById('score-val').innerText = score;
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
